<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Éo – Crieur Public</title>
  <link rel="stylesheet" href="style.css">
  
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <img src="logo.png" alt="Logo Éo" class="logo">
  </header>

  <main id="app" class="container">
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Rechercher une criée" class="search-input">
    </div>

    <h2 class="feed-title">Mes cris</h2>
    
    <section id="feed" class="feed" aria-live="polite"></section>
  </main>

  <script>
    // --- Mock API (données dynamiques) ---
    const messages = [
      { id: 1, titre: "Marché de Noël – Ce samedi", source: "Mairie de Saint-Pierre", date: "24 nov. 2025", horaire: "9h00 - 18h00", contenu: "Venez découvrir les artisans locaux sur la place centrale, le samedi 2 décembre de 9h à 18h. Vin chaud et animations pour enfants garantis !", attachments: ["Programme.pdf", "Plan_accès.jpg"] },
      { id: 2, titre: "Collecte de jouets", source: "Secours Populaire", date: "23 nov. 2025", horaire: "Toute la journée", contenu: "Déposez vos jouets en bon état au centre socioculturel, du 25 novembre au 10 décembre. Merci pour votre générosité !", attachments: ["Formulaire_don.pdf"] },
      { id: 3, titre: "Coupure d'eau demain matin", source: "Compagnie des Eaux", date: "22 nov. 2025", horaire: "8h00 - 11h00", contenu: "Intervention technique entre 8h et 11h dans le quartier Nord (rues Pasteur et Gambetta). Pensez à faire le plein avant cette heure.", attachments: [] },
      { id: 4, titre: "Cours de Yoga Gratuit", source: "Association Bien-être", date: "21 nov. 2025", horaire: "Dimanche 10h00", contenu: "Séance d'initiation au yoga au Parc de la Mairie, dimanche à 10h. Apportez votre tapis.", attachments: [] }
    ];

    // --- Utilitaires DOM ---
    const feed = document.getElementById('feed');
    
    // Mappage de l'extension de fichier à une icône
    function getFileIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        switch(ext) {
            case 'pdf': return '📄'; 
            case 'jpg':
            case 'jpeg':
            case 'png': return '🖼️'; 
            case 'doc':
            case 'docx': return '✍️'; 
            default: return '📎'; 
        }
    }

    function createCard(msg) {
      const el = document.createElement('article');
      el.className = 'card';
    
      // Logique pour les pièces jointes (affichage du trombone)
      let attachmentsHtml = '';
      if (msg.attachments && msg.attachments.length > 0) {
          attachmentsHtml = '<div class="attachments-container">';
          // Afficher jusqu'à 2 fichiers
          msg.attachments.slice(0, 2).forEach(file => {
              const icon = getFileIcon(file);
              // Lien direct cliquable depuis la carte
              attachmentsHtml += `
                  <div class="attachment-item" onclick="alert('Téléchargement de ${file}...'); event.stopPropagation();">
                      <span class="attachment-icon">${icon}</span>
                      <span class="attachment-name">${escapeHtml(file)}</span>
                  </div>
              `;
          });
          attachmentsHtml += '</div>';
      }
    
      el.innerHTML = `
        <h3 class="card-title">${escapeHtml(msg.titre)}</h3>
        <div class="card-meta">Publié par ${escapeHtml(msg.source)} • ${escapeHtml(msg.date)}</div>
        <div class="card-time">${escapeHtml(msg.horaire)}</div>

        <p class="card-extract">${escapeHtml(msg.contenu)}</p>
        
        ${attachmentsHtml}                 <button class="calendar-icon" aria-label="Ajouter à l'agenda" data-id="${msg.id}">🗓️</button>

                <button class="delete-icon" aria-label="Supprimer l'annonce" data-id="${msg.id}">🗑️</button>
      `;
      
      // Gestionnaire pour l'agenda
      const calendarButton = el.querySelector('.calendar-icon');
      calendarButton.addEventListener('click', (e) => {
        e.stopPropagation();
        addToCalendar(msg);
      });
    
      // Gestionnaire pour la suppression
      const deleteButton = el.querySelector('.delete-icon');
      deleteButton.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteMessage(msg.id, el);
      });

      el.addEventListener('click', () => openDetail(msg));
      return el;
    }

    function displayMessages(list) {
      feed.innerHTML = '';
      const sorted = list.slice().sort((a,b) => b.id - a.id);
      sorted.forEach(m => feed.appendChild(createCard(m)));
    }
    
    // Logique de simulation d'ajout à l'agenda
    function addToCalendar(msg) {
        alert(`L'événement "${msg.titre}" (par ${msg.source}) a été ajouté à votre agenda (simulation).`);
        console.log("Préparation à l'ajout à l'agenda pour :", msg);
    }

    // Logique de suppression
    function deleteMessage(id, element) {
      element.style.opacity = '0';
      element.style.transform = 'translateX(-100%)';
      element.style.transition = 'all 0.4s ease-out';
      
      setTimeout(() => {
        element.remove();
        console.log(`Message with ID ${id} deleted (mocked)`);
      }, 400);
    }

    // --- Détail accessible (simple modal) ---
    function openDetail(msg) {
        // La logique des pièces jointes est supprimée ici car elles sont visibles sur la carte
        
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal">
          <button class="modal-close" aria-label="Fermer">×</button>
          <h2>${escapeHtml(msg.titre)}</h2>
          <div class="card-meta">Publié par ${escapeHtml(msg.source)} • ${escapeHtml(msg.date)}</div>
          
          <div class="modal-body">${escapeHtml(msg.contenu)}</div>
        </div>
      `;
      modal.querySelector('.modal-close').addEventListener('click', () => modal.remove());
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
      document.body.appendChild(modal);
      modal.querySelector('.modal-close').focus();
    }

    // --- basic HTML escape ---
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // --- Init ---
    displayMessages(messages);

    window._displayMessages = displayMessages;
  </script>
</body>
</html>
