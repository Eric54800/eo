<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Éo – Crieur Public</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <!-- Utiliser logo.png (voir instructions upload) -->
    <img src=/mnt/data/A_digital_image_displays_a_logo_for_"Éo",_a_local_.png alt="Logo Éo" class="logo">
    <h1 class="brand">Éo <small>Crieur public</small></h1>
    <a class="search-link" href="search.html" aria-label="Recherche">🔍</a>
  </header>

  <main id="app" class="container">
    <section id="feed" class="feed" aria-live="polite"></section>
  </main>

  <script>
    // --- Mock API (données dynamiques) ---
    const messages = [
      {
        id: 1,
        titre: "Marché de Noël – Ce samedi",
        source: "Mairie de Saint-Pierre",
        date: "24 nov. 2025",
        contenu: "Venez découvrir les artisans locaux sur la place centrale."
      },
      {
        id: 2,
        titre: "Collecte de jouets",
        source: "Secours Populaire",
        date: "23 nov. 2025",
        contenu: "Déposez vos jouets en bon état au centre socioculturel."
      },
      {
        id: 3,
        titre: "Coupure d'eau demain matin",
        source: "Compagnie des Eaux",
        date: "22 nov. 2025",
        contenu: "Intervention technique entre 8h et 11h dans le quartier Nord."
      }
    ];

    // --- Utilitaires DOM ---
    const feed = document.getElementById('feed');

    function createCard(msg) {
      const el = document.createElement('article');
      el.className = 'card';
      el.innerHTML = `
        <h3 class="card-title">${escapeHtml(msg.titre)}</h3>
        <div class="card-meta">Publié par ${escapeHtml(msg.source)} • ${escapeHtml(msg.date)}</div>
        <p class="card-extract">${escapeHtml(msg.contenu)}</p>
      `;
      el.addEventListener('click', () => openDetail(msg));
      return el;
    }

    function displayMessages(list) {
      feed.innerHTML = '';
      // tri: le plus récent (ici mock par id décroissant)
      const sorted = list.slice().sort((a,b) => b.id - a.id);
      sorted.forEach(m => feed.appendChild(createCard(m)));
    }

    // --- Détail accessible (simple modal) ---
    function openDetail(msg) {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal">
          <button class="modal-close" aria-label="Fermer">×</button>
          <h2>${escapeHtml(msg.titre)}</h2>
          <div class="card-meta">Publié par ${escapeHtml(msg.source)} • ${escapeHtml(msg.date)}</div>
          <div class="modal-body">${escapeHtml(msg.contenu)}</div>
        </div>
      `;
      modal.querySelector('.modal-close').addEventListener('click', () => modal.remove());
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
      document.body.appendChild(modal);
    }

    // --- basic HTML escape ---
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // --- Init ---
    displayMessages(messages);

    // Exposer displayMessages pour dev (console)
    window._displayMessages = displayMessages;
  </script>
</body>
</html>
